<script>
async function calculate() {

  const apiKey = "636bd01c9b6f77fcfba389cad1148a30";

  const metal = document.getElementById("metal").value;
  const qty = parseFloat(document.getElementById("qty").value);
  const delivery = document.getElementById("delivery").value;

  if (qty <= 0 || isNaN(qty)) {
    alert("Enter a valid quantity");
    return;
  }

  let pricePerUnit;

  // 🟡 STATIC PRICES (industrial realistic estimates per kg)
  const staticPrices = {
    steel: 0.75,
    iron: 0.60
  };

  try {

    // 🟢 If metal is from API
    if (metal === "copper" || metal === "aluminium") {

      const apiMap = {
        copper: "XCU",
        aluminium: "XAL"
      };

      const url = `https://api.metalpriceapi.com/v1/latest?api_key=${apiKey}&base=USD&currencies=${apiMap[metal]}`;

      const response = await fetch(url);
      const data = await response.json();

      pricePerUnit = data.rates[apiMap[metal]];

    } 
    // 🟡 Otherwise use static
    else {
      pricePerUnit = staticPrices[metal];
    }

    // 🚚 Simple delivery logic
    let deliveryCost = qty * 0.2; // 20p per kg

    // 📅 Optional: faster delivery costs more
    if (delivery) {
      const today = new Date();
      const selected = new Date(delivery);
      const days = (selected - today) / (1000 * 60 * 60 * 24);

      if (days < 3) {
        deliveryCost += 10; // rush fee
      }
    }

    const total = (pricePerUnit * qty) + deliveryCost;

    document.getElementById("result").innerHTML = `
      Metal: ${metal} <br>
      Price per kg: $${pricePerUnit.toFixed(2)} <br>
      Quantity: ${qty} kg <br>
      Delivery Date: ${delivery || "Not selected"} <br>
      Delivery Cost: $${deliveryCost.toFixed(2)} <br>
      <hr>
      Total Cost: $${total.toFixed(2)}
    `;

  } catch (error) {
    document.getElementById("result").innerText = "Error loading data.";
    console.error(error);
  }
}
</script>
