<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Metal Cost Calculator</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    padding: 30px;
  }

  .container {
    background: white;
    padding: 25px;
    border-radius: 12px;
    max-width: 450px;
    margin: auto;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  h2 {
    text-align: center;
  }

  label {
    margin-top: 10px;
    display: block;
  }

  select, input, button {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 6px;
    border: 1px solid #ccc;
  }

  button {
    background: #2e7d32;
    color: white;
    border: none;
    cursor: pointer;
    font-weight: bold;
  }

  button:hover {
    background: #1b5e20;
  }

  #result {
    margin-top: 20px;
    padding: 15px;
    background: #eef7ee;
    border-radius: 8px;
  }
</style>
</head>

<body>

<div class="container">
  <h2>Metal Cost Calculator</h2>

  <label>Select Metal:</label>
  <select id="metal">
    <option value="steel">Steel</option>
    <option value="iron">Iron</option>
    <option value="copper">Copper</option>
    <option value="aluminium">Aluminium</option>
  </select>

  <label>Quantity (kg):</label>
  <input type="number" id="qty" value="10">

  <label>Delivery Date:</label>
  <input type="date" id="delivery">

  <button onclick="calculate()">Calculate Cost</button>

  <div id="result"></div>
</div>

<script>
async function calculate() {

  const apiKey = "YOUR_API_KEY_HERE";

  const metal = document.getElementById("metal").value;
  const qty = parseFloat(document.getElementById("qty").value);
  const delivery = document.getElementById("delivery").value;

  if (qty <= 0 || isNaN(qty)) {
    alert("Please enter a valid quantity.");
    return;
  }

  let pricePerKg;

  // Static fallback prices (USD per kg)
  const staticPrices = {
    steel: 0.75,
    iron: 0.60
  };

  try {

    // API metals
    if (metal === "copper" || metal === "aluminium") {

      const apiMap = {
        copper: "XCU",
        aluminium: "XAL"
      };

      const url = `https://api.metalpriceapi.com/v1/latest?api_key=${apiKey}&base=USD&currencies=${apiMap[metal]}`;

      const response = await fetch(url);
      const data = await response.json();

      pricePerKg = data.rates[apiMap[metal]];

    } else {
      // Use static prices
      pricePerKg = staticPrices[metal];
    }

    // Delivery cost logic
    let deliveryCost = qty * 0.2;

    if (delivery) {
      const today = new Date();
      const selected = new Date(delivery);
      const days = (selected - today) / (1000 * 60 * 60 * 24);

      if (days < 3) {
        deliveryCost += 10; // rush fee
      }
    }

    const materialCost = pricePerKg * qty;
    const total = materialCost + deliveryCost;

    document.getElementById("result").innerHTML = `
      <strong>Order Summary</strong><br><br>
      Metal: ${metal}<br>
      Price per kg: $${pricePerKg.toFixed(2)}<br>
      Quantity: ${qty} kg<br>
      Material Cost: $${materialCost.toFixed(2)}<br>
      Delivery Cost: $${deliveryCost.toFixed(2)}<br>
      Delivery Date: ${delivery || "Not selected"}<br>
      <hr>
      <strong>Total Cost: $${total.toFixed(2)}</strong>
    `;

  } catch (error) {
    document.getElementById("result").innerText = "Error retrieving data.";
    console.error(error);
  }
}
</script>

</body>
</html>
